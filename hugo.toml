baseURL = "https://frapaparatto.github.io"
languageCode = "en-us"
title = "Francesco"
theme = "nostyleplease"

[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true
  [markup.highlight]
    codeFences = true
    lineNos = false
    style = "rrt"
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[params]
  [params.theme_config]
    appearance = "auto"
    back_home_text = ".."
    date_format = "2006-01-02"
    isListGroupByDate = false
    isShowFooter = true
